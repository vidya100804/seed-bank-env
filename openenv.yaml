name: seed_bank_env
version: "1.0.0"
description: >
  A climate crisis environment where an AI agent manages a seed bank.
  The agent must distribute and crossbreed seed varieties to maximize
  crop yields across villages facing drought, pests, and disease.
author: "Diva's Team"
tags:
  - openenv
  - agriculture
  - climate
  - rl
tasks:
  - id: easy
    description: "1 village with drought. Pick the best drought-resistant seed."
    difficulty: easy
  - id: medium
    description: "2 villages with drought and pests. Crossbreed for resistance."
    difficulty: medium
  - id: hard
    description: "5 villages with spreading disease over multiple seasons."
    difficulty: hard
endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  grade: GET  /grade