name: seed_bank_env
version: "1.0.0"
description: >
  A climate crisis environment where an AI agent manages a seed bank.
  The agent must distribute and crossbreed seed varieties to maximize
  crop yields across villages facing drought, pests, and disease.
author: "Diva's Team"
tags:
  - openenv
  - agriculture
  - climate
  - rl
tasks:
  - id: easy
    name: "Severe Drought Response"
    description: "1 village with drought. Pick the best drought-resistant seed."
    difficulty: easy
    max_steps: 10
  - id: medium
    name: "Dual-Stress Seed Planning"
    description: "2 villages with drought and pests. Crossbreed for resistance."
    difficulty: medium
    max_steps: 10
  - id: hard
    name: "Multi-Village Crisis Management"
    description: "5 villages with spreading disease over multiple seasons."
    difficulty: hard
    max_steps: 10

reward_range:
  low: 0.01
  high: 0.99

observation_space:
  type: object
  fields:
    season: integer
    max_seasons: integer
    villages: array
    available_seeds: object
    task_id: string
    message: string

action_space:
  type: object
  fields:
    action_type: string
    seed_id: string
    village_id: string
    seed_a: string
    seed_b: string

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  grade: GET  /grade
